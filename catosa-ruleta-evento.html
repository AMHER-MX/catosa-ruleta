<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catosa · Ruleta de Evento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1c1f22;
    --panel:#24282c;
    --panel-2:#2f353a;
    --line:#3a4147;
    --accent:#f76707;
    --accent-dim:#c9540b;
    --gold:#ffc107;
    --text:#f4f1ea;
    --text-dim:#9aa4ab;
    --success:#2f9e44;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; overflow:hidden;}
  body{
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 16px),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    width:100vw;
    height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Stage (lo que ve el público en la TV) ---------- */
  .stage{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    padding:1.5vh 2vw 7vh;
  }
  .stage-header{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    flex-shrink:0;
  }
  .stage-header img{height:min(6vh,54px); width:auto;}
  .stage-header .subline{
    font-size:min(2vh,14px);
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--text-dim);
  }

  .hazard{
    width:100%;
    max-width:900px;
    height:5px;
    margin:1.4vh 0;
    flex-shrink:0;
    background:repeating-linear-gradient(135deg, var(--accent) 0 10px, #1c1f22 10px 20px);
    opacity:0.85;
  }

  .content{
    flex:1;
    min-height:0;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  /* ---------- Paso: Bienvenida ---------- */
  .welcome-step{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    width:min(90vw,640px);
  }
  .welcome-step .lead{
    font-size:min(2.6vh,19px);
    color:var(--text-dim);
    margin-bottom:2.4vh;
  }
  .welcome-step input{
    width:100%;
    background:var(--panel);
    border:2px solid var(--line);
    color:var(--text);
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:min(4vh,32px);
    text-align:center;
    padding:2vh 1.5vh;
    border-radius:14px;
    outline:none;
    margin-bottom:3vh;
  }
  .welcome-step input:focus{border-color:var(--accent);}
  .welcome-step input::placeholder{color:var(--text-dim); font-weight:500;}

  /* ---------- Ticker público de ganadores ---------- */
  .winners-ticker{
    position:fixed;
    left:0; right:0; bottom:0;
    display:flex;
    gap:10px;
    padding:10px 14px;
    background:rgba(36,40,44,0.9);
    border-top:1px solid var(--line);
    overflow:hidden;
    white-space:nowrap;
    z-index:10;
  }
  .winners-ticker .chip{
    flex-shrink:0;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:20px;
    padding:6px 14px;
    font-size:min(1.9vh,13px);
    color:var(--text-dim);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .winners-ticker .chip b{color:var(--gold); font-weight:600;}
  .winners-ticker .chip .trophy{color:var(--accent);}
  .winners-ticker.empty{display:none;}

  h1.title{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:min(4.2vh,34px);
    margin:0 0 1.5vh;
    text-align:center;
  }

  /* ---------- Wheel (mismo estilo: rin de camión) ---------- */
  .wheel-wrap{
    position:relative;
    width:min(58vh,58vw,560px);
    height:min(58vh,58vw,560px);
    filter:drop-shadow(0 14px 30px rgba(0,0,0,0.6));
  }
  .pointer{
    position:absolute;
    top:-1%; left:50%;
    transform:translateX(-50%);
    width:6%; height:8%;
    z-index:5;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,0.6));
  }
  .pointer svg{width:100%; height:100%; display:block;}
  .wheel{
    width:100%;
    height:100%;
    transition:transform 4.6s cubic-bezier(0.12,0.7,0.15,1);
  }
  .hub{
    position:absolute;
    top:50%; left:50%;
    width:11%; height:11%;
    background:radial-gradient(circle at 35% 30%, #f2f2f2, #9aa0a4 55%, #565c60);
    border-radius:50%;
    transform:translate(-50%,-50%);
    z-index:4;
    box-shadow:0 0 0 5px #14171a, inset 0 -3px 6px rgba(0,0,0,0.35), 0 3px 8px rgba(0,0,0,0.5);
  }
  .hub::after{
    content:"";
    position:absolute;
    inset:22%;
    border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #d7d7d7, #7a8085);
    box-shadow:inset 0 2px 3px rgba(0,0,0,0.4);
  }

  .spin-btn-wrap{margin-top:3vh;}
  button.primary{
    background:var(--accent);
    color:#1c1f22;
    border:none;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:min(2.6vh,20px);
    letter-spacing:0.5px;
    text-transform:uppercase;
    padding:1.6vh 4vw;
    border-radius:10px;
    cursor:pointer;
    transition:transform .15s ease;
  }
  button.primary:active{transform:scale(0.97);}
  button.primary:disabled{background:var(--panel-2); color:var(--text-dim); cursor:not-allowed;}

  .participant-tag{
    margin-top:1.6vh;
    font-family:'Oswald',sans-serif;
    font-size:min(2.4vh,18px);
    color:var(--text-dim);
    letter-spacing:1px;
  }
  .participant-tag b{color:var(--gold);}

  /* ---------- Resultado (overlay) ---------- */
  .result-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,12,13,0.86);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  .result-overlay.show{display:flex;}
  .result-box{
    background:var(--panel);
    border:2px solid var(--gold);
    border-radius:20px;
    padding:5vh 6vw;
    text-align:center;
    max-width:80vw;
  }
  .result-box .eyebrow{
    font-family:'Oswald',sans-serif;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--gold);
    font-size:min(2.6vh,20px);
  }
  .result-box .who{
    font-size:min(3vh,22px);
    color:var(--text-dim);
    margin-top:1vh;
  }
  .result-box .prize{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:min(6vh,48px);
    margin:1.5vh 0 3vh;
    color:var(--text);
  }

  canvas#confetti{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:60;
  }

  /* ---------- Panel de staff ---------- */
  .gear-toggle{
    position:fixed;
    bottom:16px; right:16px;
    width:44px; height:44px;
    border-radius:50%;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text-dim);
    font-size:20px;
    cursor:pointer;
    z-index:70;
  }
  .panel{
    position:fixed;
    top:0; right:0;
    width:340px;
    max-width:90vw;
    height:100vh;
    background:var(--panel);
    border-left:1px solid var(--line);
    transform:translateX(100%);
    transition:transform .3s ease;
    z-index:65;
    overflow-y:auto;
    padding:20px;
  }
  .panel.open{transform:translateX(0);}
  .panel h2{
    font-family:'Oswald',sans-serif;
    font-size:16px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--accent);
    margin:18px 0 8px;
  }
  .panel h2:first-child{margin-top:0;}
  .panel input{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-size:14px;
    padding:10px 12px;
    border-radius:8px;
    outline:none;
  }
  .stock-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    padding:7px 0;
    border-bottom:1px solid var(--line);
  }
  .stock-row .n{color:var(--text-dim);}
  .stock-row .count{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    color:var(--gold);
  }
  .stock-row.depleted .count{color:#ff6b6b;}
  .log-row{
    font-size:12.5px;
    padding:8px 0;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    gap:8px;
  }
  .log-row .lname{color:var(--text);}
  .log-row .lprize{color:var(--text-dim); text-align:right;}
  .log-empty{font-size:12.5px; color:var(--text-dim); font-style:italic;}
  .panel-btn{
    width:100%;
    margin-top:14px;
    background:transparent;
    border:1.5px solid var(--line);
    color:var(--text);
    font-size:13px;
    font-weight:600;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
  }
  .panel-btn.danger{border-color:#ff6b6b; color:#ff6b6b;}
</style>
</head>

<script>
  /* =========================================================
     CONFIGURACIÓN — editar aquí para el evento
     stock: número de piezas físicas disponibles.
     stock: Infinity  → premio de respaldo sin límite (llavero, cuaderno, etc.)
     ========================================================= */
  const PRIZES = [
    { id:"jersey",   label:"Jersey",   full:"Jersey Acereros",       stock:1 },
    { id:"gorra",    label:"Gorra",    full:"Gorra Acereros",        stock:2 },
    { id:"kit",      label:"Kit Intl", full:"Kit International",     stock:2 },
    { id:"termo",    label:"Termo",    full:"Termo International",   stock:3 },
    { id:"llavero",  label:"Llavero",  full:"Llavero Catosa",        stock:Infinity },
    { id:"cuaderno", label:"Cuaderno", full:"Cuaderno Catosa",       stock:Infinity },
  ];
  const INITIAL_STOCK = PRIZES.map(p => p.stock);

  const N = PRIZES.length;
  const SEG_ANGLE = 360 / N;
  const LOG = [];
  let hasSpun = false;

  /* =========================================================
     Dibujar la ruleta — mismo estilo "rin de camión"
     ========================================================= */
  function polar(cx, cy, r, angleDeg){
    const rad = angleDeg * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }

  function escapeXml(str){
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function buildWheel(){
    const svg = document.getElementById("wheel");
    const cx = 150, cy = 150;
    const rSeg = 120, rBezel = 126, rTire = 140, rText = 96, rLug = 126, textPad = 2.5;

    let defs = `
      <defs>
        <radialGradient id="segA" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#3d444a"/><stop offset="100%" stop-color="#262b2f"/>
        </radialGradient>
        <radialGradient id="segB" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#474f56"/><stop offset="100%" stop-color="#2f353a"/>
        </radialGradient>
        <linearGradient id="chromeRing" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#e8e9ea"/><stop offset="30%" stop-color="#8b9095"/>
          <stop offset="50%" stop-color="#f5f5f5"/><stop offset="70%" stop-color="#7d8287"/>
          <stop offset="100%" stop-color="#c9cbcd"/>
        </linearGradient>
        <radialGradient id="lugGrad" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#f0f0f0"/><stop offset="100%" stop-color="#6e7378"/>
        </radialGradient>
      </defs>`;

    let tire = `
      <circle cx="${cx}" cy="${cy}" r="${rTire}" fill="none" stroke="#0d0f10" stroke-width="18"/>
      <circle cx="${cx}" cy="${cy}" r="${rTire}" fill="none" stroke="#212426" stroke-width="18" stroke-dasharray="3 7"/>
      <circle cx="${cx}" cy="${cy}" r="${rTire+8.5}" fill="none" stroke="#050607" stroke-width="2"/>
      <circle cx="${cx}" cy="${cy}" r="${rTire-8.5}" fill="none" stroke="#050607" stroke-width="2"/>`;

    let segments = "", texts = "", lugs = "", depleted = "";

    for (let i = 0; i < N; i++){
      const p = PRIZES[i];
      const startAngle = i * SEG_ANGLE - 90;
      const endAngle = startAngle + SEG_ANGLE;
      const p1 = polar(cx, cy, rSeg, startAngle);
      const p2 = polar(cx, cy, rSeg, endAngle);
      const largeArc = SEG_ANGLE > 180 ? 1 : 0;
      const fill = i % 2 === 0 ? "url(#segA)" : "url(#segB)";
      const pathD = `M${cx},${cy} L${p1.x.toFixed(2)},${p1.y.toFixed(2)} A${rSeg},${rSeg} 0 ${largeArc} 1 ${p2.x.toFixed(2)},${p2.y.toFixed(2)} Z`;

      segments += `<path d="${pathD}" fill="${fill}" stroke="#14171a" stroke-width="1.5"/>`;

      const midAngle = startAngle + SEG_ANGLE/2;
      const midRad = midAngle * Math.PI/180;
      const bottomHalf = Math.sin(midRad) > 0;
      const a1 = startAngle + textPad, a2 = endAngle - textPad;
      const tp1 = polar(cx, cy, rText, bottomHalf ? a2 : a1);
      const tp2 = polar(cx, cy, rText, bottomHalf ? a1 : a2);
      const sweep = bottomHalf ? 0 : 1;
      const arcId = `arcSeg${i}`;

      texts += `<path id="${arcId}" d="M${tp1.x.toFixed(2)},${tp1.y.toFixed(2)} A${rText},${rText} 0 0 ${sweep} ${tp2.x.toFixed(2)},${tp2.y.toFixed(2)}" fill="none" stroke="none"/>`;
      texts += `<text font-family="Oswald, sans-serif" font-weight="600" font-size="13" fill="${p.stock===0?'#6b7075':'#f4f1ea'}" letter-spacing="0.2">
        <textPath href="#${arcId}" startOffset="50%" text-anchor="middle">${escapeXml(p.label)}</textPath>
      </text>`;

      if (p.stock === 0){
        depleted += `<path d="${pathD}" fill="rgba(10,12,13,0.62)"/>`;
      }

      const lp = polar(cx, cy, rLug, startAngle);
      lugs += `<circle cx="${lp.x.toFixed(2)}" cy="${lp.y.toFixed(2)}" r="4.4" fill="url(#lugGrad)" stroke="#3a3d40" stroke-width="0.6"/>`;
    }

    const bezel = `<circle cx="${cx}" cy="${cy}" r="${rBezel}" fill="none" stroke="url(#chromeRing)" stroke-width="9"/>`;
    svg.innerHTML = defs + tire + bezel + segments + depleted + texts + lugs;
  }

  /* =========================================================
     Selección ponderada — el peso ES el stock restante,
     así un premio agotado (stock 0) nunca puede volver a salir.
     Los premios con stock:Infinity actúan como respaldo constante.
     ========================================================= */
  function weight(p){
    return p.stock === Infinity ? 8 : p.stock;
  }

  function weightedRandomIndex(){
    const total = PRIZES.reduce((s,p)=>s+weight(p), 0);
    let r = Math.random() * total;
    for (let i=0;i<PRIZES.length;i++){
      const w = weight(PRIZES[i]);
      if (r < w) return i;
      r -= w;
    }
    return PRIZES.length - 1;
  }

  function startTurn(){
    const name = document.getElementById("nameInput").value.trim();
    document.getElementById("participantTag").querySelector("b").textContent = name || "Invitado";
    document.getElementById("stepWelcome").style.display = "none";
    document.getElementById("stepWheel").style.display = "flex";
  }

  function spin(){
    if (hasSpun) return;
    hasSpun = true;
    document.getElementById("spinBtn").disabled = true;

    const name = document.getElementById("nameInput").value.trim() || "Invitado";

    const winIndex = weightedRandomIndex();
    const segCenter = winIndex * SEG_ANGLE + SEG_ANGLE/2;
    const fullSpins = 6 * 360;
    const jitter = (Math.random() * (SEG_ANGLE*0.6)) - (SEG_ANGLE*0.3);
    const finalRotation = fullSpins + (360 - segCenter) + jitter;

    const wheel = document.getElementById("wheel");
    wheel.style.transform = `rotate(${finalRotation}deg)`;

    setTimeout(()=>{
      const prize = PRIZES[winIndex];
      if (prize.stock !== Infinity) prize.stock -= 1;

      document.getElementById("resultWho").textContent = name;
      document.getElementById("resultPrize").textContent = prize.full;
      document.getElementById("resultOverlay").classList.add("show");
      playFanfare();
      launchConfetti();

      LOG.unshift({ name, prize: prize.full, time: new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}) });
      renderStock();
      renderLog();
      renderTicker();
      buildWheel();
    }, 4700);
  }

  function closeResult(){
    document.getElementById("resultOverlay").classList.remove("show");
    document.getElementById("nameInput").value = "";
    document.getElementById("spinBtn").disabled = false;
    hasSpun = false;
    document.getElementById("stepWheel").style.display = "none";
    document.getElementById("stepWelcome").style.display = "flex";
    document.getElementById("nameInput").focus();
  }

  function renderTicker(){
    const el = document.getElementById("winnersTicker");
    if (LOG.length === 0){
      el.classList.add("empty");
      return;
    }
    el.classList.remove("empty");
    el.innerHTML = LOG.slice(0, 12).map(l => `
      <div class="chip"><span class="trophy">🏆</span> <b>${escapeXml(l.name)}</b> — ${escapeXml(l.prize)}</div>
    `).join("");
  }

  /* =========================================================
     Panel de staff
     ========================================================= */
  function togglePanel(){
    document.getElementById("staffPanel").classList.toggle("open");
  }

  function renderStock(){
    const el = document.getElementById("stockList");
    el.innerHTML = PRIZES.map(p => `
      <div class="stock-row ${p.stock===0?'depleted':''}">
        <span class="n">${escapeXml(p.full)}</span>
        <span class="count">${p.stock===Infinity ? '∞' : p.stock}</span>
      </div>
    `).join("");
  }

  function renderLog(){
    const el = document.getElementById("logList");
    if (LOG.length === 0){
      el.innerHTML = `<div class="log-empty">Aún no hay giros.</div>`;
      return;
    }
    el.innerHTML = LOG.map(l => `
      <div class="log-row">
        <span class="lname">${escapeXml(l.name)}</span>
        <span class="lprize">${escapeXml(l.prize)} · ${l.time}</span>
      </div>
    `).join("");
  }

  function resetDay(){
    if (!confirm("Esto reinicia el inventario y borra la bitácora del día. ¿Continuar?")) return;
    PRIZES.forEach((p,i)=> p.stock = INITIAL_STOCK[i]);
    LOG.length = 0;
    renderStock();
    renderLog();
    renderTicker();
    buildWheel();
    closeResult();
  }

  function toggleFullscreen(){
    if (!document.fullscreenElement){
      document.documentElement.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen();
    }
  }

  /* =========================================================
     Sonido (Web Audio API, sin archivos externos)
     ========================================================= */
  function playFanfare(){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
      notes.forEach((freq, i)=>{
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        const start = ctx.currentTime + i*0.11;
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.25, start+0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, start+0.35);
        osc.connect(gain).connect(ctx.destination);
        osc.start(start);
        osc.stop(start+0.4);
      });
    } catch(e){ /* audio no disponible, seguimos sin sonido */ }
  }

  /* =========================================================
     Confeti (canvas simple, sin librerías)
     ========================================================= */
  function launchConfetti(){
    const canvas = document.getElementById("confetti");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext("2d");
    const colors = ["#f76707","#ffc107","#f4f1ea","#2f9e44"];
    const pieces = Array.from({length:120}, () => ({
      x: Math.random()*canvas.width,
      y: -20 - Math.random()*canvas.height*0.4,
      w: 6+Math.random()*6,
      h: 8+Math.random()*8,
      vy: 2+Math.random()*3,
      vx: -1.5+Math.random()*3,
      rot: Math.random()*360,
      vr: -6+Math.random()*12,
      color: colors[Math.floor(Math.random()*colors.length)]
    }));

    let frames = 0;
    const maxFrames = 220;
    function tick(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p=>{
        p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      });
      frames++;
      if (frames < maxFrames){
        requestAnimationFrame(tick);
      } else {
        ctx.clearRect(0,0,canvas.width,canvas.height);
      }
    }
    tick();
  }

  window.addEventListener("resize", ()=>{
    const canvas = document.getElementById("confetti");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  buildWheel();
  renderStock();
  renderLog();
</script>
</body>
